# Hyprland config mirroring the i3 workflow in ~/.config/i3/config.

$mod = SUPER

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    layout = dwindle
}

decoration {
    rounding = 0
}

animations {
    enabled = false
}

input {
    kb_layout = us
    kb_variant = colemak_dh
    follow_mouse = 1
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

# Monitor setup equivalent to ~/.config/i3/monitor_setup.sh.
# If these names do not match, run `hyprctl monitors` in Hyprland and update them.
monitor = DP-2,1920x1080@144,0x0,1
monitor = DP-3,1920x1080@144,1920x0,1
monitor = HDMI-A-1,1920x1080@60,3840x0,1
monitor = ,preferred,auto,1

# Startup.
exec-once = hyprctl setcursor Adwaita 24
exec-once = nm-applet
exec-once = waybar

# Applications.
bind = $mod, RETURN, exec, kitty
bind = $mod, F, exec, firefox
bind = $mod, S, exec, rofi -show drun
bind = $mod, G, exec, grim -g "$(slurp)" -t ppm - | satty --filename - --fullscreen --copy-command wl-copy --output-filename ~/Pictures/screenshot-%Y-%m-%d_%H-%M-%S.png
bind = $mod SHIFT, W, exec, ~/.config/rofi/wallpaper_selector.sh

# Media keys.
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

bindl = , XF86AudioPlay, exec, playerctl --player=spotify play-pause
bindl = , XF86AudioNext, exec, playerctl --player=spotify next
bindl = , XF86AudioPrev, exec, playerctl --player=spotify previous

bindl = $mod, XF86AudioPlay, exec, playerctl play-pause
bindl = $mod, XF86AudioNext, exec, playerctl next
bindl = $mod, XF86AudioPrev, exec, playerctl previous

# Window actions.
bind = $mod, Q, killactive,
bind = $mod, T, fullscreen,
bind = $mod, W, togglefloating,

# Focus movement: same Colemak-oriented keys as i3.
bind = $mod, N, movefocus, l
bind = $mod, E, movefocus, d
bind = $mod, I, movefocus, u
bind = $mod, O, movefocus, r
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

# Move focused window.
bind = $mod SHIFT, N, movewindow, l
bind = $mod SHIFT, E, movewindow, d
bind = $mod SHIFT, I, movewindow, u
bind = $mod SHIFT, O, movewindow, r
bind = $mod SHIFT, LEFT, movewindow, l
bind = $mod SHIFT, DOWN, movewindow, d
bind = $mod SHIFT, UP, movewindow, u
bind = $mod SHIFT, RIGHT, movewindow, r

# Workspaces.
$ws1 = 1
$ws2 = 2
$ws3 = 3
$ws4 = 4
$ws5 = 5
$ws6 = 6
$ws7 = 7
$ws8 = 8
$ws9 = 9
$ws10 = 10
$ws_left = 11
$ws_right = 12

bind = $mod, J, workspace, $ws1
bind = $mod, L, workspace, $ws2
bind = $mod, U, workspace, $ws3
bind = $mod, Y, workspace, $ws4
bind = $mod, SEMICOLON, workspace, $ws5
bind = $mod, BRACKETLEFT, workspace, $ws6
bind = $mod, BRACKETRIGHT, workspace, $ws7
bind = $mod, 8, workspace, $ws8
bind = $mod, 9, workspace, $ws9
bind = $mod, 0, workspace, $ws10
bind = $mod, MINUS, workspace, $ws_left
bind = $mod, EQUAL, workspace, $ws_right

bind = $mod SHIFT, J, movetoworkspace, $ws1
bind = $mod SHIFT, L, movetoworkspace, $ws2
bind = $mod SHIFT, U, movetoworkspace, $ws3
bind = $mod SHIFT, Y, movetoworkspace, $ws4
bind = $mod SHIFT, SEMICOLON, movetoworkspace, $ws5
bind = $mod SHIFT, BRACKETLEFT, movetoworkspace, $ws6
bind = $mod SHIFT, BRACKETRIGHT, movetoworkspace, $ws7
bind = $mod SHIFT, 8, movetoworkspace, $ws8
bind = $mod SHIFT, 9, movetoworkspace, $ws9
bind = $mod SHIFT, 0, movetoworkspace, $ws10
bind = $mod SHIFT, MINUS, movetoworkspace, $ws_left
bind = $mod SHIFT, EQUAL, movetoworkspace, $ws_right

workspace = $ws_left, monitor:DP-2
workspace = $ws_right, monitor:HDMI-A-1
workspace = $ws1, monitor:DP-3
workspace = $ws2, monitor:DP-3
workspace = $ws3, monitor:DP-3
workspace = $ws4, monitor:DP-3
workspace = $ws5, monitor:DP-3
workspace = $ws6, monitor:DP-3
workspace = $ws7, monitor:DP-3
workspace = $ws8, monitor:DP-3
workspace = $ws9, monitor:DP-3
workspace = $ws10, monitor:DP-3

# Hyprland session controls.
bind = $mod SHIFT, D, exec, hyprctl reload
bind = $mod SHIFT, P, exec, hyprctl reload
bind = $mod SHIFT, F, exit,

# Resize mode.
bind = $mod, R, submap, resize
submap = resize
bind = , O, resizeactive, -10 0
bind = , E, resizeactive, 0 10
bind = , I, resizeactive, 0 -10
bind = , N, resizeactive, 10 0
bind = , LEFT, resizeactive, -10 0
bind = , DOWN, resizeactive, 0 10
bind = , UP, resizeactive, 0 -10
bind = , RIGHT, resizeactive, 10 0
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
bind = $mod, P, submap, reset
submap = reset
